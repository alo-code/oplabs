name: CI

on:
  push:
  pull_request:

jobs:
  v0-crawl:
    name: v0-crawl — typecheck + tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: v0-crawl
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm install
      - run: npm run typecheck
      - run: npm test
